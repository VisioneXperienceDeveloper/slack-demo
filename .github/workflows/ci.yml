name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_clerk_dummy_key_for_ci_build_validation_12345
          CLERK_SECRET_KEY: sk_test_clerk_dummy_secret_for_ci_build_validation_12345
          NEXT_PUBLIC_CONVEX_URL: https://dummy.convex.cloud
          CLERK_JWT_ISSUER_DOMAIN: https://dummy.clerk.accounts.dev
